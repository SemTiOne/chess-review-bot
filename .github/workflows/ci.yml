name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: "Python ${{ matrix.python-version }} / ${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - run: pip install -e ".[dev]"
      - run: pytest --cov=chessreview --cov-report=term-missing --cov-fail-under=85
      - run: pip check

      - name: Smoke test against this repository's own history
        run: chessreview HEAD~1..HEAD --summary || true
